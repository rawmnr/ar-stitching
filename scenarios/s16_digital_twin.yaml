scenario_id: s16_digital_twin
description: Jumeau numérique haute-fidélité (PSF, Déformation temporelle, Roll-off, Ripples).
grid_shape: [64, 64]
tile_shape: [32, 32]
pixel_size: 1.0
scan_offsets:
  - [-10.5, -10.5]
  - [10.5, -10.5]
  - [-10.5, 10.5]
  - [10.5, 10.5]
baseline_name: mean
seed: 16
metadata:
  truth_basis: zernike
  truth_coefficients: [0.0, 0.0, 0.0, 0.2] # Convex signal
  optical_psf_sigma: 0.8 # Optical smoothing
  surface_bending_drift: 0.05 # Piece deforms over time
  detector_pupil: circular
  detector_edge_roll_off: 3.0 # Soft boundaries
  mid_spatial_ripple_std: 0.02 # Polishing marks
  low_frequency_noise_std: 0.03
  realized_pose_drift_std: 0.05
  interpolation_order: 3 # Bicubic
  ignore_piston: true
